<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRPG名詞/專有名詞辭典 | TRPG辭典</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1612;
            color: #e2d6be;
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            line-height: 1.8;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 900px;
            width: 92%;
            margin: 40px auto;
            padding: 40px;
            background-color: #2c241e;
            border: 2px solid #8c6d48;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border-radius: 4px;
            position: relative;
        }
        header {
            text-align: center;
            border-bottom: 2px dashed #8c6d48;
            padding-bottom: 25px;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 2.8em;
            margin: 0;
            color: #d9a752;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            letter-spacing: 0.1em;
        }
        .subtitle {
            color: #bfa17a;
            font-size: 1.1em;
            margin-top: 10px;
            font-style: italic;
        }
        
        /* 🔍 全新：冒險者搜尋框風格設計 */
        .search-area {
            max-width: 600px;
            margin: 0 auto 35px auto;
            display: flex;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            border-radius: 4px;
            overflow: hidden;
        }
        .search-input {
            flex: 1;
            background-color: #211a15;
            border: 2px solid #6e5334;
            border-right: none;
            padding: 12px 18px;
            color: #e2d6be;
            font-size: 1em;
            font-family: inherit;
            border-radius: 4px 0 0 4px;
            transition: all 0.3s ease;
        }
        /* 搜尋框點擊時的金色魔法發光特效 */
        .search-input:focus {
            outline: none;
            border-color: #d9a752;
            background-color: #261f19;
            box-shadow: inset 0 0 8px rgba(217, 167, 82, 0.2);
        }
        /* 搜尋框佔位文字顏色 */
        .search-input::placeholder {
            color: #735d49;
            font-style: italic;
        }
        .search-btn {
            background: linear-gradient(135deg, #bd2c2c 0%, #8c1a1a 60%, #5c1010 100%);
            color: #ffffff;
            border: none;
            border-top: 1px solid #e64545;
            border-right: 1px solid #5c1010;
            border-bottom: 4px solid #4a0909;
            padding: 0 25px;
            font-size: 0.95em;
            font-weight: bold;
            letter-spacing: 0.1em;
            cursor: pointer;
            border-radius: 0 4px 4px 0;
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .search-btn:hover {
            background: linear-gradient(135deg, #d43f3f 0%, #a82222 60%, #731515 100%);
            color: #fff;
        }
        .search-btn:active {
            transform: translateY(2px);
            border-bottom: 1px solid #4a0909;
        }

        section {
            margin-bottom: 40px;
        }
        h2 {
            color: #d9a752;
            border-left: 4px solid #ff9900;
            padding-left: 15px;
            font-size: 1.6em;
            margin-top: 30px;
        }
        p {
            text-align: justify;
            color: #d5c8af;
        }
        
        /* 核心分類大方框 */
        .category-box {
            background-color: #211a15;
            border: 2px solid #6e5334;
            padding: 30px;
            border-radius: 6px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.6);
            margin-top: 25px;
        }
        
        /* 網格佈局 */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        /* 互動菜單選項按鈕 */
        .category-item {
            display: flex;
            align-items: center;
            text-decoration: none;
            background-color: #2c241e;
            border: 1px solid #4a3b2c;
            padding: 15px 20px;
            border-radius: 4px;
            color: #bfa17a;
            font-weight: bold;
            font-size: 1.1em;
            transition: all 0.25s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        
        /* 滑鼠懸停：卡片整體浮起發光 */
        .category-item:hover {
            transform: translateY(-3px);
            color: #ffb84d;
            background-color: #36291f;
            border-color: #d9a752;
            box-shadow: 0 6px 15px rgba(217, 167, 82, 0.2);
        }
        
        /* 3D 立體工藝骰子效果 */
        .dice-icon, .menu-dice {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #bd2c2c 0%, #8c1a1a 60%, #5c1010 100%);
            color: #ffffff;
            font-weight: bold;
            font-size: 1.2em;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            
            border-top: 1px solid #e64545;
            border-left: 1px solid #bd2c2c;
            border-right: 2px solid #5c1010;
            border-bottom: 4px solid #4a0909;
            
            box-shadow: 0 4px 6px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
            text-shadow: 1px 1px 1px rgba(0,0,0,0.7);
            
            transform: translateY(-2px);
            transition: all 0.15s ease;
            vertical-align: middle;
            flex-shrink: 0;
        }

        .dice-icon {
            margin-left: 10px;
        }

        .menu-dice {
            margin-right: 12px;
        }
        
        /* 物理反饋 */
        .category-item:hover .menu-dice {
            transform: translateY(1px);
            border-bottom: 1px solid #4a0909;
            box-shadow: 0 1px 2px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        
        footer {
            margin-top: 60px;
            padding-top: 20px;
            border-top: 1px solid #4a3b2c;
            font-size: 0.85em;
            color: #735d49;
            text-align: center;
            line-height: 1.6;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>TRPG名詞/專有名詞辭典<span class="dice-icon">⚅</span></h1>
            <div class="subtitle">「骰面已定，命運的齒輪開始轉動。」—— 歡迎來到我們的 TRPG 跑團空間</div>
        </header>

        <main>
            <div class="search-area">
                <input type="text" id="keyword-search" class="search-input" placeholder="輸入關鍵字檢索調查員筆記...">
                <button class="search-btn" onclick="performSearch()">投擲檢索</button>
            </div>

            <section>
                <h2>關於本站</h2>
                <p>
                    這裡是一名熱愛桌上角色扮演遊戲（TRPG）的開拓者營地。無論你是老玩家或新玩家，都能在這裡找到關於各類名詞和縮寫名詞的解釋。本網站及各項名詞皆由單人製作，亦包括日後增減、修改之部分。
                </p>
            </section>

            <section class="category-box">
                <h2>📚 辭典核心分類</h2>
                <p style="font-size: 0.9em; color: #bfa17a; font-style: italic; margin-bottom: 15px;">
                    選擇一個知識領域切入，開啟你的遭遇戰：
                </p>
                <div class="category-grid">
                    <a href="#" class="category-item"><span class="menu-dice">⚅</span> 所有名詞</a>
                    <a href="#" class="category-item"><span class="menu-dice">⚅</span> 基礎介紹</a>
                    <a href="#" class="category-item"><span class="menu-dice">⚅</span> 遊戲類型</a>
                    <a href="#" class="category-item"><span class="menu-dice">⚅</span> 遊玩介紹</a>
                    <a href="#" class="category-item"><span class="menu-dice">⚅</span> 數值</a>
                    <a href="#" class="category-item"><span class="menu-dice">⚅</span> 關於本站</a>
                </div>
            </section>
        </main>

        <footer>
            本網站之架設、內容不作為任何商業利益之用途，是基於生成式AI（Gemini）之協助架設，程式碼不予公布。
        </footer>
    </div>

    <script>
        function performSearch() {
            const query = document.getElementById('keyword-search').value.trim();
            if (query === '') {
                alert('請輸入想檢索的名詞關鍵字！');
                return;
            }
            // 這裡留給日後名詞資料串接時擴充，目前先提供流暢的介面反饋
            console.log('玩家正在檢索關鍵字：' + query);
        }

        // 綁定 Enter 鍵，讓玩家按確定也能直接搜尋
        document.getElementById('keyword-search').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                performSearch();
            }
        });
    </script>

</body>
</html>
